<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #e94560;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 16px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }

    .status-dot.recording {
      background: #e94560;
      animation: pulse 1.2s infinite;
    }

    .status-dot.ready {
      background: #0f3460;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .timer {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 28px;
      text-align: center;
      margin-bottom: 16px;
      color: #e94560;
      letter-spacing: 2px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: #e94560;
      color: white;
    }

    .btn-start:hover {
      background: #c73e54;
    }

    .btn-stop {
      background: #533483;
      color: white;
    }

    .btn-stop:hover {
      background: #442b6e;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }

    .message.error {
      background: #3d1521;
      color: #e94560;
      display: block;
    }

    .message.success {
      background: #1a3d2b;
      color: #4ecca3;
      display: block;
    }

    .server-status {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-top: 12px;
    }

    .server-status.connected {
      color: #4ecca3;
    }

    .server-status.disconnected {
      color: #e94560;
    }

    .mode-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #0f3460;
    }

    .mode-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: #16213e;
      color: #888;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: #0f3460;
      color: #eee;
    }

    .mode-btn:hover:not(.active) {
      background: #1a2a4a;
    }

    .resolution-picker {
      display: none;
      margin-bottom: 16px;
    }

    .resolution-picker.visible {
      display: block;
    }

    .resolution-picker label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      display: block;
    }

    .resolution-picker select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #16213e;
      color: #eee;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .resolution-picker select:focus {
      border-color: #e94560;
    }
  </style>
</head>
<body>
  <h1>Tab Audio Recorder</h1>
  <p class="subtitle">Capture tab audio for English learning</p>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>

  <div class="mode-toggle" id="modeToggle">
    <button class="mode-btn active" data-mode="audio">Audio (MP3)</button>
    <button class="mode-btn" data-mode="video">Video (WebM)</button>
  </div>

  <div class="resolution-picker" id="resolutionPicker">
    <label>Video Resolution</label>
    <select id="resolutionSelect">
      <option value="original">Original (tab resolution)</option>
      <option value="1080">1080p (1920×1080)</option>
      <option value="720" selected>720p (1280×720)</option>
      <option value="480">480p (854×480)</option>
      <option value="360">360p (640×360)</option>
    </select>
  </div>

  <div class="timer" id="timer">00:00:00</div>

  <button class="btn btn-start" id="startBtn">Start Recording</button>
  <button class="btn btn-stop" id="stopBtn" style="display:none">Stop & Save MP3</button>

  <div class="message" id="message"></div>
  <div class="server-status" id="serverStatus">Checking server...</div>

  <script src="popup.js"></script>
</body>
</html>
